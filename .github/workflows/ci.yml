name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # eframe / egui — same baseline as release.yml for Linux UI builds.
      - name: Install Linux UI build deps (eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libx11-dev \
            libgl1-mesa-dev libglib2.0-dev libgtk-3-dev

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy (mhrv-f, all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test (mhrv-f, ui)
        run: cargo test --all-targets --features ui

      - name: clippy (tunnel-node)
        working-directory: tunnel-node
        run: cargo clippy --all-targets -- -D warnings

      - name: test (tunnel-node)
        working-directory: tunnel-node
        run: cargo test --all-targets
