<?xml version="1.0" encoding="UTF-8"?>
<!--
  MasterHttpRelayVPN-Frankestein: primary logo mark (512x512 artboard).
  Safe area: keep important strokes inside ~88% of the square for app icons.
  License: same as the repository (MIT) unless you specify otherwise.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">MasterHttpRelayVPN-Frankestein</title>
  <desc id="logoDesc">Monogram M with a central relay hub on a deep blue rounded square.</desc>
  <defs>
    <linearGradient id="bg" x1="8%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#1c2838"/>
      <stop offset="55%" stop-color="#121a24"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ec4ff"/>
      <stop offset="100%" stop-color="#3d84d6"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2f7ff"/>
      <stop offset="100%" stop-color="#c8d6ea"/>
    </linearGradient>
  </defs>
  <!-- Squircle plate -->
  <rect width="512" height="512" rx="132" ry="132" fill="url(#bg)"/>
  <!-- Soft inner vignette -->
  <rect width="512" height="512" rx="132" ry="132" fill="none" stroke="#000" stroke-opacity="0.35" stroke-width="24"/>
  <!-- Orbit arc (relay path) -->
  <path
    fill="none"
    stroke="#355070"
    stroke-width="10"
    stroke-linecap="round"
    stroke-opacity="0.55"
    d="M 96 268 C 96 168 168 96 256 96 C 344 96 416 168 416 268"/>
  <path
    fill="none"
    stroke="url(#accent)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-opacity="0.35"
    d="M 112 288 C 130 200 200 140 256 140 C 312 140 382 200 400 288"/>
  <!-- Packet dots on the path -->
  <circle cx="148" cy="248" r="9" fill="url(#accent)" opacity="0.85"/>
  <circle cx="364" cy="248" r="9" fill="url(#accent)" opacity="0.85"/>
  <!-- Letter M -->
  <path
    fill="url(#letter)"
    d="M 132 372 L 132 148 L 208 148 L 256 248 L 304 148 L 380 148 L 380 372 L 316 372 L 316 228 L 272 312 L 240 312 L 196 228 L 196 372 Z"/>
  <!-- Relay hub (junction) -->
  <circle cx="256" cy="278" r="36" fill="url(#accent)"/>
  <circle cx="256" cy="278" r="18" fill="#0a1624" opacity="0.92"/>
  <!-- Highlight rim on hub -->
  <circle cx="256" cy="278" r="36" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3"/>
</svg>
